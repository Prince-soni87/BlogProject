{% if user.is_authenticated %}
    <a href="{% url 'create_post' %}">Create Post</a><br><br>
    <form action="{% url 'logout' %}" method="post">
        {% csrf_token %}
        <button type="submit">Logout</button>
    </form>
    {% else %}
    <a href="{% url 'login' %}">Login</a><br>   
    <a href="{% url 'signup' %}">Register</a><br><br>
        

{% endif %}


{% for post in posts %}
    {{post.title}}<br>
    {% if post.image %}
        <img src="{{ post.image.url }}" alt="" width="300">
    {% endif %}
    {{post.title}}<br>
    By {{post.author.username}} at {{post.created_at}}<br>
    {{post.content}}<br>
    <a href="{% url 'post_detail' post.id %}">Read more</a><br><br>
{% endfor %}
